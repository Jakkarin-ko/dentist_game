<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Teeth AI - Clear View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        .star-glow { filter: drop-shadow(0 0 10px #fbbf24); }
        .bg-dark-mesh { background: radial-gradient(circle at top right, #1e1b4b, #020617); }
    </style>
</head>
<body class="bg-dark-mesh text-white min-h-screen flex items-center justify-center p-4 font-sans overflow-hidden">

    <audio id="bg-music" loop src="https://cdn.pixabay.com/audio/2024/03/26/audio_2434522956.mp3"></audio>
    <audio id="sfx-correct" src="https://cdn.pixabay.com/audio/2022/03/15/audio_1334530656.mp3"></audio>

    <div id="app" class="w-full max-w-md relative">
        <div id="home-screen" class="bg-slate-900/90 backdrop-blur-xl p-8 rounded-[50px] shadow-2xl text-center border-b-8 border-indigo-600 border-x-2 border-indigo-500/20">
            <div class="text-7xl mb-4">🦷</div>
            <h1 class="text-4xl font-black mb-1 text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-pink-400 font-sans">HAPPY TEETH</h1>
            
            <div class="mt-6 mb-8 bg-slate-950/50 p-4 rounded-3xl border border-slate-800">
                <p class="text-[10px] font-bold text-indigo-400 uppercase tracking-[0.3em] mb-3">ภารกิจสะสมดวงดาว 7 วัน</p>
                <div id="star-container" class="flex justify-between px-2"></div>
                <p id="streak-text" class="text-xs text-slate-500 mt-3 font-bold">แปรงฟันให้ครบ 7 วันเพื่อรับรางวัลใหญ่!</p>
            </div>

            <div class="bg-slate-950 p-5 rounded-3xl mb-8 border border-slate-800">
                <p class="text-slate-500 font-bold text-[10px] uppercase mb-1 tracking-widest text-left ml-1 font-sans">Last Score</p>
                <div id="display-score" class="text-6xl font-black mb-2">0%</div>
                <div class="w-full bg-slate-800 rounded-full h-3 overflow-hidden">
                    <div id="score-bar" class="h-full bg-gradient-to-r from-indigo-500 to-pink-500 transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>

            <button onclick="initAI()" class="w-full py-6 bg-indigo-600 rounded-[30px] text-2xl font-black shadow-xl hover:bg-indigo-500 active:scale-95 transition-all">
                เริ่มแปรงฟัน! 🚀
            </button>
        </div>

        <div id="setup-screen" class="hidden bg-slate-900 p-12 rounded-[50px] shadow-2xl text-center border-b-8 border-slate-700">
            <div class="inline-block animate-spin rounded-full h-16 w-16 border-4 border-indigo-500 border-t-transparent mb-8"></div>
            <h2 class="text-2xl font-bold mb-2">กำลังเตรียมสมอง AI</h2>
            <p id="status-text" class="text-indigo-400 text-xs font-mono uppercase tracking-[0.2em]">Loading...</p>
        </div>

        <div id="game-screen" class="hidden flex flex-col items-center">
            <div class="relative w-full aspect-[3/4] bg-black rounded-[45px] overflow-hidden border-[6px] border-slate-800 shadow-2xl">
                <video id="webcam" class="absolute inset-0 w-full h-full object-cover scale-x-[-1]" playsinline muted></video>
                <canvas id="overlay" class="absolute inset-0 w-full h-full"></canvas>
                <div id="timer" class="absolute top-6 right-6 bg-pink-600 text-white px-5 py-2 rounded-2xl font-black text-2xl shadow-xl border-2 border-white/20">10s</div>
                <div id="screen-flash" class="absolute inset-0 bg-transparent transition-colors duration-200 pointer-events-none"></div>
            </div>
            <div class="mt-4 bg-slate-900 p-4 rounded-2xl w-full text-center border border-slate-800">
                <p id="zone-tag" class="text-indigo-400 font-black uppercase text-sm tracking-widest mb-1">โซนที่ 1: ซ้ายบน</p>
                <p class="text-white text-xs opacity-70">มองเห็นฟันชัดขึ้นแล้ว! แปรงให้ตรงจุดนะ</p>
            </div>
        </div>
    </div>

    <div id="finish-overlay" class="hidden fixed inset-0 bg-slate-950/90 z-50 flex flex-col items-center justify-center p-10 backdrop-blur-md">
        <div class="text-9xl mb-6">🌟</div>
        <h2 class="text-5xl font-black mb-2 text-white text-center">สุดยอดไปเลย!</h2>
        <p class="text-indigo-300 text-xl mb-10 text-center">คุณได้รับดวงดาวของวันนี้แล้ว</p>
        <button onclick="location.reload()" class="px-12 py-5 bg-indigo-600 text-white rounded-full text-2xl font-black shadow-2xl">รับรางวัล</button>
    </div>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        let faceLandmarker, isGameRunning = false, timeLeft = 10, currentZone = 1, finalScore = 0;
        const video = document.getElementById('webcam'), canvas = document.getElementById('overlay'), ctx = canvas.getContext('2d');
        const zones = [{n:"ซ้ายบน",x:-80,y:-50},{n:"ขวาบน",x:80,y:-50},{n:"ซ้ายล่าง",x:-80,y:50},{n:"ขวาล่าง",x:80,y:50}];

        function updateStars() {
            const starContainer = document.getElementById('star-container');
            let streak = JSON.parse(localStorage.getItem('brush_streak') || "[]");
            starContainer.innerHTML = '';
            for(let i=0; i<7; i++) {
                const isActive = streak[i] === true;
                starContainer.innerHTML += `<div class="text-2xl ${isActive ? 'text-yellow-400 star-glow' : 'text-slate-700'}">${isActive ? '⭐' : '🔘'}</div>`;
            }
        }

        window.initAI = async () => {
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('setup-screen').classList.remove('hidden');
            try {
                const fileset = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
                faceLandmarker = await FaceLandmarker.createFromOptions(fileset, {
                    baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task", delegate: "CPU" },
                    runningMode: "VIDEO"
                });
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                video.onloadedmetadata = () => { video.play(); canvas.width = video.videoWidth; canvas.height = video.videoHeight; startGame(); };
            } catch (e) { alert(e); location.reload(); }
        };

        function startGame() {
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            isGameRunning = true;
            document.getElementById('bg-music').play();
            renderLoop();
            const timerInt = setInterval(() => {
                if(!isGameRunning) { clearInterval(timerInt); return; }
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft + "s";
                document.getElementById('zone-tag').innerText = `โซนที่ ${currentZone}: ${zones[currentZone-1].n}`;
                if(timeLeft <= 0) { 
                    if(currentZone < 4) { currentZone++; timeLeft = 10; } 
                    else { clearInterval(timerInt); finishGame(); }
                }
            }, 1000);
        }

        function finishGame() {
            isGameRunning = false;
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            let streak = JSON.parse(localStorage.getItem('brush_streak') || "[]");
            if(streak.length >= 7) streak = [];
            streak.push(true);
            localStorage.setItem('brush_streak', JSON.stringify(streak));
            document.getElementById('finish-overlay').classList.remove('hidden');
        }

        function renderLoop() {
            if(!isGameRunning) return;
            const results = faceLandmarker.detectForVideo(video, Date.now());
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const flash = document.getElementById('screen-flash');

            if (results.faceLandmarks?.[0]) {
                const lip = results.faceLandmarks[0][13];
                const mx = (1-lip.x)*canvas.width, my = lip.y*canvas.height;
                const zone = zones[currentZone-1];
                const tx = mx+zone.x, ty = my+zone.y;
                const dist = Math.sqrt((mx-tx)**2 + (my-ty)**2);
                
                const isOk = dist < 65;
                if(isOk) {
                    finalScore = Math.min(100, finalScore + 0.2);
                    flash.style.backgroundColor = "rgba(74, 222, 128, 0.1)";
                    document.getElementById('sfx-correct').play();
                } else {
                    flash.style.backgroundColor = "rgba(239, 68, 68, 0.1)";
                }

                document.getElementById('display-score').innerText = Math.round(finalScore) + "%";
                document.getElementById('score-bar').style.width = finalScore + "%";

                // วาดเป้าหมายเส้นประ
                ctx.beginPath(); ctx.arc(tx, ty, 50, 0, Math.PI*2);
                ctx.strokeStyle = isOk ? "#4ade80" : "#ef4444";
                ctx.lineWidth = 5; ctx.setLineDash([10, 10]); ctx.stroke();

                // วาดจุดที่ปากแบบ Transparent 30% (ใสขึ้นมาก)
                ctx.setLineDash([]); 
                ctx.beginPath(); 
                ctx.arc(mx, my, 35, 0, Math.PI*2);
                
                // แก้เป็น 0.3 (30%)
                ctx.fillStyle = isOk ? "rgba(74, 222, 128, 0.3)" : "rgba(255, 255, 255, 0.3)";
                
                ctx.shadowBlur = 15; 
                ctx.shadowColor = isOk ? "#4ade80" : "#ffffff"; 
                ctx.fill();
                
                // เส้นขอบบางๆ เพื่อให้ยังเห็นขอบเขตฟองสบู่
                ctx.strokeStyle = isOk ? "rgba(74, 222, 128, 0.5)" : "rgba(255, 255, 255, 0.5)";
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }
            requestAnimationFrame(renderLoop);
        }
        updateStars();
    </script>
</body>
</html>
