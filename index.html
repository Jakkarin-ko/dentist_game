<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Teeth AI - Full Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-4 font-sans">

    <div id="app" class="w-full max-w-md">
        <div id="home-screen" class="bg-slate-800 p-10 rounded-[50px] shadow-2xl text-center border-b-8 border-indigo-500">
            <div class="text-8xl mb-6">🦷</div>
            <h1 class="text-3xl font-black mb-2 text-indigo-400 tracking-tighter">HAPPY TEETH</h1>
            <p class="text-slate-400 text-[10px] mb-8 uppercase tracking-[0.3em] font-bold">AI Dental Assistant</p>
            
            <div class="bg-slate-900/50 p-6 rounded-3xl mb-8 border border-slate-700 shadow-inner">
                <p class="text-indigo-400 font-bold text-[10px] uppercase mb-1 tracking-widest text-left ml-1">Overall Cleanliness</p>
                <div id="display-score" class="text-7xl font-black mb-2 text-white">0%</div>
                <div class="w-full bg-slate-700 rounded-full h-3 overflow-hidden border border-slate-800">
                    <div id="score-bar" class="h-full bg-indigo-500 transition-all duration-1000 shadow-[0_0_15px_rgba(99,102,241,0.5)]" style="width: 0%"></div>
                </div>
            </div>

            <button id="start-btn" onclick="initAI()" class="w-full py-6 bg-indigo-600 rounded-[30px] text-2xl font-black shadow-lg shadow-indigo-500/20 active:scale-95 transition-all hover:bg-indigo-500">
                เริ่มแปรงฟัน! 🚀
            </button>
        </div>

        <div id="setup-screen" class="hidden bg-slate-800 p-10 rounded-[50px] shadow-2xl text-center border-b-8 border-slate-700">
            <div class="inline-block animate-spin rounded-full h-14 w-14 border-4 border-indigo-500 border-t-transparent mb-6"></div>
            <h2 class="text-2xl font-bold mb-2">กำลังเตรียมระบบ AI</h2>
            <p id="status-text" class="text-indigo-400 text-xs font-mono uppercase tracking-[0.2em] animate-pulse">Initialising...</p>
        </div>

        <div id="game-screen" class="hidden flex flex-col items-center">
            <div class="relative w-full aspect-[3/4] bg-black rounded-[45px] overflow-hidden border-[6px] border-slate-800 shadow-2xl">
                <video id="webcam" class="absolute inset-0 w-full h-full object-cover scale-x-[-1]" playsinline muted></video>
                <canvas id="overlay" class="absolute inset-0 w-full h-full"></canvas>
                
                <div class="absolute top-6 inset-x-6 flex justify-between items-center">
                    <div id="timer" class="bg-pink-600 text-white px-5 py-2 rounded-2xl font-black text-2xl shadow-xl border-2 border-white/20">10s</div>
                    <div id="zone-tag" class="bg-indigo-600 text-white px-4 py-2 rounded-2xl font-bold text-sm border-2 border-white/20 tracking-tighter uppercase">โซนที่ 1: ซ้ายบน</div>
                </div>
            </div>
            <div class="mt-6 bg-slate-800 p-5 rounded-3xl w-full text-center border border-slate-700">
                <p id="instruction" class="text-indigo-300 font-bold text-lg animate-pulse">แปรงฟันตามวงกลมสีขาวเลย!</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        let faceLandmarker;
        let isGameRunning = false;
        let timeLeft = 10;
        let currentZone = 1;
        let finalScore = 0;

        const video = document.getElementById('webcam');
        const canvas = document.getElementById('overlay');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status-text');

        const zones = [
            { id: 1, name: "ซ้ายบน", ox: -70, oy: -40 },
            { id: 2, name: "ขวาบน", ox: 70, oy: -40 },
            { id: 3, name: "ซ้ายล่าง", ox: -70, oy: 40 },
            { id: 4, name: "ขวาล่าง", ox: 70, oy: 40 }
        ];

        window.initAI = async () => {
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('setup-screen').classList.remove('hidden');

            try {
                status.innerText = "1. Loading WASM Engine...";
                const fileset = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");

                status.innerText = "2. Training AI Brain...";
                faceLandmarker = await FaceLandmarker.createFromOptions(fileset, {
                    baseOptions: {
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
                        delegate: "CPU"
                    },
                    runningMode: "VIDEO"
                });

                status.innerText = "3. Starting Camera...";
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    startGame();
                };
            } catch (err) {
                alert("Error: " + err.message);
                location.reload();
            }
        };

        function startGame() {
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            isGameRunning = true;
            currentZone = 1;
            timeLeft = 10;
            renderLoop();
            
            const timerInt = setInterval(() => {
                if (!isGameRunning) { clearInterval(timerInt); return; }
                
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft + "s";
                document.getElementById('zone-tag').innerText = `โซนที่ ${currentZone}: ${zones[currentZone-1].name}`;

                if (timeLeft <= 0) {
                    if (currentZone < 4) {
                        currentZone++;
                        timeLeft = 10;
                    } else {
                        clearInterval(timerInt);
                        finishGame();
                    }
                }
            }, 1000);
        }

        function finishGame() {
            isGameRunning = false;
            finalScore = 100;
            document.getElementById('display-score').innerText = "100%";
            document.getElementById('score-bar').style.width = "100%";
            
            const stream = video.srcObject;
            if(stream) stream.getTracks().forEach(t => t.stop());
            
            alert("ยอดเยี่ยมมาก! ฟันสะอาดทุกโซนแล้ว ✨");
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('home-screen').classList.remove('hidden');
        }

        function renderLoop() {
            if (!isGameRunning) return;

            const results = faceLandmarker.detectForVideo(video, Date.now());
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (results.faceLandmarks?.[0]) {
                // หาตำแหน่งปาก
                const lip = results.faceLandmarks[0][13];
                const mx = (1 - lip.x) * canvas.width;
                const my = lip.y * canvas.height;

                // วาดจุดเป้าหมายตามโซนที่ต้องแปรง
                const zone = zones[currentZone - 1];
                const targetX = mx + zone.ox;
                const targetY = my + zone.oy;

                // วาดวงกลมเป้าหมาย (Animated Circle)
                ctx.beginPath();
                ctx.arc(targetX, targetY, 45, 0, Math.PI * 2);
                ctx.strokeStyle = "rgba(255, 255, 255, 0.5)";
                ctx.lineWidth = 4;
                ctx.setLineDash([10, 5]);
                ctx.stroke();

                // วาดฟองสบู่ที่ตำแหน่งปาก (ตรวจจับด้วย AI)
                ctx.setLineDash([]);
                ctx.beginPath();
                ctx.arc(mx, my, 25, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
                ctx.shadowBlur = 20;
                ctx.shadowColor = "white";
                ctx.fill();
            }
            requestAnimationFrame(renderLoop);
        }
    </script>
</body>
</html>
